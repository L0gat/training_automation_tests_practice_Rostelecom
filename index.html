<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Allure отчёты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 50px;
            max-width: 640px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border: 1px solid #2a2a4a;
        }
        h1 {
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8892b0;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: #1e2d4a;
            border-radius: 14px;
            padding: 22px 30px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
        }
        .card:hover {
            background: #2a3d62;
            transform: translateY(-3px);
            border-color: #64ffda;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .card .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .card .icon {
            font-size: 30px;
        }
        .card .info {
            text-align: left;
        }
        .card .info .title {
            font-size: 18px;
            font-weight: 600;
        }
        .card .info .desc {
            font-size: 13px;
            color: #8892b0;
            margin-top: 2px;
        }
        .card .arrow {
            color: #64ffda;
            font-size: 24px;
            font-weight: 300;
        }
        .badge {
            display: inline-block;
            background: #64ffda;
            color: #0f0f1a;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            margin-top: 4px;
        }
        .footer {
            color: #495670;
            font-size: 13px;
            margin-top: 36px;
            border-top: 1px solid #1e2d4a;
            padding-top: 24px;
        }
        .footer a {
            color: #64ffda;
            text-decoration: none;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 26px; }
            .card { padding: 16px 20px; flex-wrap: wrap; }
            .card .left { gap: 12px; }
            .card .info .title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Allure Отчёты</h1>
        <p class="subtitle">Выберите отчёт для просмотра</p>

        <div class="cards">
            <a href="ui-report/" class="card">
                <div class="left">
                    <span class="icon">🖥️</span>
                    <div class="info">
                        <div class="title">UI-тесты</div>
                        <div class="desc">Selenium WebDriver + Java + TestNG</div>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="api-report/" class="card">
                <div class="left">
                    <span class="icon">🔌</span>
                    <div class="info">
                        <div class="title">API-тесты</div>
                        <div class="desc">Python + pytest + requests</div>
                    </div>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer">
            Автотесты для игрового портала и сервиса сотрудников<br>
            Производственная практика, 2026
        </div>
    </div>
</body>
</html>
